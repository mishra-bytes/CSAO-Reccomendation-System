lightgbm:
  objective: lambdarank
  metric: ndcg
  boosting_type: gbdt
  num_leaves: 63
  learning_rate: 0.05
  n_estimators: 200
  min_child_samples: 10
  subsample: 0.85
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 1.0
  force_col_wise: true
  verbosity: -1

train:
  validation_fraction: 0.2
  min_queries_for_training: 50
